<!DOCTYPE html>
<html>
    <head>
        <title>
            image tag
        </title>
    </head>
    <body>
        <P align="center">the image tag is used to define an image in the web page.<br>
        there are main 2 required attributes of image tag are src & alt.</P> 
        <!--centered image align-->
        <img src="nature.webp" alt="loading image" align="center" height="400" width="600" border="5" 
        hspace="100px" vspace="100px" style="display:block; margin:auto;">
       <p style="font-size:30px">this is another image using image tag.
        <br>
        using default align.
        </p> 
        <!--default / right aligned image-->
        <img src="screenshot.png" alt="image is loaded" height="600" width="600" border="3" vspace="50px" hspace="50px">
        <br>
        <b style="text-align:right">this is one another image using image tag.
            <br>
            using a align right.
        </b>
        <br>
        <!--left aligned image-->
        <img src="Screenshot 2026-05-26 150347.png",alt="image is loaded" height="400" width="700" align="right" border="3" 
        vspace="40px" hspace="40px" >
    </body>
</html>
