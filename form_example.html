<!DOCTYPE HTML>
<html>

<HEAD>
    <TITLE>
        FORM EX
    </title>

<body style="background-color:rgb(219, 155, 202);">
    <form style="text-align : center; width: 50%; margin: 0 auto; border: 2px solid black; background-color:rgb(208, 198, 208); padding:20px; border-radius:10px;">
        <br>
        <h1 style="color:rgb(18, 19, 18); font-family: Verdana, Geneva, Tahoma, sans-serif;">STUDENT REGISTRATION FORM
        </h1><br>
        <label>Name:</label>
        <input type="text" placeholder="Enter Name" /><br><br>
        <label>Class:</label>
        <input type="text" placeholder="Enter Class" /><br><br>
        <label>Age:</label>
        <input type="text" placeholder="Enter Age" /><br><br>
        <label>Email:</label>
        <input type="email" placeholder="Enter Email" /><br><br>
        <label>Password:</label>
        <input type="password" placeholder="Enter Password" /><br><br>
        <label>Hobbies:</label>
        <input type="checkbox" />Reading
        <input type="checkbox" />Swimming
        <input type="checkbox" />Singing<br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male" />Male
        <input type="radio" name="gender" value="Female" />Female<br><br>
        Photo: <input type="file" /><br><br>
        DOB: <input type="date" /><br><br>
        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" /><br><br><br><br>
    </form>
</body>
